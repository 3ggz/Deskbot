; firmware/face/platformio.ini
; Pip — face controller for ESP32-S3-Touch-LCD-2.1
; Uses LovyanGFX for ST7701S RGB panel support on Arduino-ESP32 2.x.

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    lovyan03/LovyanGFX@^1.2.0
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
board_build.partitions = default.csv
