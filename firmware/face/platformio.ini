; firmware/face/platformio.ini
; Pip — face controller for ESP32-S3-Touch-LCD-2.1
; Arduino-GFX 1.4.9 — pinned for Arduino-ESP32 2.x compatibility.

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 8MB
lib_deps =
    moononournation/GFX Library for Arduino@1.4.9
    madhephaestus/ESP32Servo @ ^3.0.5
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_MODE_OCT
    -DCONFIG_SPIRAM_USE_MALLOC
build_unflags =
    -DCONFIG_SPIRAM_MODE_QUAD
board_build.partitions = default.csv
